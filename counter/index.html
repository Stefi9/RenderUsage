<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncable Money Counter</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; user-select: none; transition: transform 0.1s; }
        .card:active { transform: scale(0.95); background: #252525; }
        .val { font-size: 1.5rem; font-weight: bold; color: #4caf50; }
        .count { font-size: 1rem; color: #888; margin-top: 5px; }
        #total-box { font-size: 2rem; font-weight: bold; padding: 15px; background: #1e1e1e; border-radius: 8px; border-left: 5px solid #4caf50; display: flex; justify-content: space-between; align-items: center; }
        button.reset { background: #cf6679; border: 1px solid #444; padding: 10px 20px; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="grid" id="counter-grid"></div>

    <div id="total-box">
        <span>Total: &euro;<span id="grand-total">0.00</span></span>
        <button class="reset" onclick="resetAll()">Reset All</button>
    </div>

    <script>
        const euro = '\u20AC';
        const denoms = [
            { id: 'm200', val: 200, label: euro + '200' }, { id: 'm100', val: 100, label: euro + '100' },
            { id: 'm50',  val: 50,  label: euro + '50' },  { id: 'm20',  val: 20,  label: euro + '20' },
            { id: 'm10',  val: 10,  label: euro + '10' },  { id: 'm5',   val: 5,   label: euro + '5' },
            { id: 'm2',   val: 2,   label: euro + '2' },   { id: 'm1',   val: 1,   label: euro + '1' },
            { id: 'm050', val: 0.5, label: '50c' },  { id: 'm020', val: 0.2, label: '20c' },
            { id: 'm010', val: 0.1, label: '10c' },  { id: 'm005', val: 0.05, label: '5c' },
            { id: 'm002', val: 0.02, label: '2c' },  { id: 'm001', val: 0.01, label: '1c' }
        ];

        let counts = {};
        denoms.forEach(d => counts[d.id] = 0);

        // This function sends data to the PC hard drive automatically
        async function saveToServer() {
            try {
                await fetch('/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(counts)
                });
            } catch (err) {
                console.error("Failed to save to server hard drive", err);
            }
        }

        // This pulls the data straight from counts.json file on your PC when opening the app
        async function loadFromServer() {
            try {
                const response = await fetch('counts.json?nocache=' + new Date().getTime());
                if (response.ok) {
                    const data = await response.json();
                    Object.keys(data).forEach(key => { if(counts[key] !== undefined) counts[key] = data[key]; });
                }
            } catch (err) {
                console.log("No previous server save file detected, starting fresh.");
            }
            render();
        }

        function render() {
            const grid = document.getElementById('counter-grid');
            grid.innerHTML = '';
            let grandTotal = 0;

            denoms.forEach(d => {
                const currentCount = counts[d.id];
                grandTotal += currentCount * d.val;

                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => { counts[d.id]++; render(); saveToServer(); };
                card.oncontextmenu = (e) => { e.preventDefault(); if(counts[d.id] > 0) { counts[d.id]--; render(); saveToServer(); } };
                
                card.innerHTML = `
                    <div class="val">${d.label}</div>
                    <div class="count">Qty: ${currentCount}</div>
                `;
                grid.appendChild(card);
            });

            document.getElementById('grand-total').textContent = grandTotal.toFixed(2);
        }

        function resetAll() {
            if(confirm("Reset all counts on server?")) {
                denoms.forEach(d => counts[d.id] = 0);
                render();
                saveToServer();
            }
        }

        // Initialize by pulling data from the PC file
        loadFromServer();
    </script>
</body>
</html>
